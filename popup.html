<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { font: 13px system-ui; width: 360px; padding: 12px; }
  label { display:block; margin-top:8px; font-weight:600; }
  input, select, button { width:100%; padding:6px; margin-top:4px; box-sizing:border-box; }
  button { background:#635bff; color:#fff; border:0; border-radius:4px; cursor:pointer; padding:8px; margin-top:12px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #log { margin-top:10px; max-height:140px; overflow:auto; font-family:monospace; font-size:11px; white-space:pre-wrap; background:#f5f5f7; padding:6px; border-radius:4px; }
  .row { display:flex; gap:6px; }
  .row > * { flex:1; }
  .tasklist { margin-top:4px; max-height:200px; overflow-y:auto; border:1px solid #ccc; border-radius:4px; background:#fff; font-weight:400; }
  .tasklist .item { padding:6px 8px; cursor:pointer; border-bottom:1px solid #f0f0f0; line-height:1.35; overflow-wrap:anywhere; }
  .tasklist .item:last-child { border-bottom:0; }
  .tasklist .item:hover { background:#f5f5f7; }
  .tasklist .item.selected { background:#635bff; color:#fff; }
  .tasklist .item.selected .meta { color:#dcd9ff; }
  .tasklist .item .name { font-weight:600; }
  .tasklist .item .meta { font-size:11px; color:#666; margin-top:2px; }
  .tasklist .empty { padding:8px; color:#888; font-style:italic; text-align:center; }
  .tasklist .create-row { display:flex; gap:6px; align-items:center; padding:6px 8px; border-bottom:1px solid #e5e5e7; background:#f9f9fb; }
  .tasklist .create-row input { flex:1; padding:4px 6px; margin:0; font-size:12px; box-sizing:border-box; }
  .tasklist .create-row button { width:auto; padding:4px 10px; margin:0; font-size:12px; background:#635bff; color:#fff; border:0; border-radius:3px; cursor:pointer; }
  .tasklist .create-row button:disabled { opacity:.5; cursor:not-allowed; }
  #billable {width: unset;}
  .blud { display:flex; flex-direction:row; gap:8px; align-items:stretch; margin-top:12px; }
  .blud #go { flex:1; margin-top:0; }
  #settingsBtn { flex:0 0 auto; width:auto; padding:0 10px; margin-top:0; background:transparent; color:#666; border:1px solid #ccc; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
  #settingsBtn:hover { background:#f5f5f7; color:#222; border-color:#999; }
  #settingsBtn svg { display:block; }
  dialog#settingsModal { border:0; border-radius:8px; padding:0; width:300px; box-shadow:0 8px 24px rgba(0,0,0,.15); }
  dialog#settingsModal::backdrop { background:rgba(0,0,0,.3); }
  dialog#settingsModal .modal-body { padding:16px; }
  dialog#settingsModal h3 { margin:0 0 4px 0; }
  dialog#settingsModal .modal-actions { display:flex; justify-content:flex-end; margin-top:14px; }
  dialog#settingsModal .modal-actions button { width:auto; padding:6px 14px; margin:0; }
</style></head><body>
  <h3 style="margin:0">Compicated Onboarding</h3>
  <label>Organization
    <select id="org"><option value="">— Recent tasks —</option></select>
  </label>
  <label>Project
    <select id="project" disabled><option value="">— pick an organization —</option></select>
  </label>
  <label>Task
    <input id="taskSearch" type="search" placeholder="Search tasks…" autocomplete="off" />
    <div id="task" class="tasklist" role="listbox" tabindex="0"><div class="empty">— loading —</div></div>
  </label>
  <label>Date (YYYY-MM-DD)
    <input id="date" type="date" />
  </label>
  <label>Total time
    <div class="row">
      <input id="hours" type="number" min="0" value="0" />
      <input id="mins"  type="number" min="0" max="59" value="0" />
    </div>
  </label>
  <label>Billable<input type="checkbox" id="billable" checked /></label>
  <div class="blud">
    <button id="go">Insert time log</button>
    <button id="settingsBtn" type="button" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
        <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
      </svg>
    </button>
  </div>
  <dialog id="settingsModal">
    <form method="dialog" class="modal-body">
      <h3>Settings</h3>
      <label>Time split (minutes per log)
        <input id="splitMinutes" type="number" min="1" max="480" value="90" />
      </label>
      <label>Tenant slug
        <input id="tenant" value="mojodojo" />
      </label>
      <label>Batch size (entries per request)
        <input id="batch" type="number" min="1" max="120" value="60" />
      </label>
      <div class="modal-actions">
        <button type="submit" value="ok">Done</button>
      </div>
    </form>
  </dialog>
  <div id="log"></div>
<script src="popup.js"></script>
</body></html>
