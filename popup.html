<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { font: 13px system-ui; width: 360px; padding: 12px; }
  label { display:block; margin-top:8px; font-weight:600; }
  input, select, button { width:100%; padding:6px; margin-top:4px; box-sizing:border-box; }
  button { background:#635bff; color:#fff; border:0; border-radius:4px; cursor:pointer; padding:8px; margin-top:12px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #log { margin-top:10px; max-height:140px; overflow:auto; font-family:monospace; font-size:11px; white-space:pre-wrap; background:#f5f5f7; padding:6px; border-radius:4px; }
  .row { display:flex; gap:6px; }
  .row > * { flex:1; }
  .tasklist { margin-top:4px; max-height:200px; overflow-y:auto; border:1px solid #ccc; border-radius:4px; background:#fff; font-weight:400; }
  .tasklist .item { padding:6px 8px; cursor:pointer; border-bottom:1px solid #f0f0f0; line-height:1.35; overflow-wrap:anywhere; }
  .tasklist .item:last-child { border-bottom:0; }
  .tasklist .item:hover { background:#f5f5f7; }
  .tasklist .item.selected { background:#635bff; color:#fff; }
  .tasklist .item.selected .meta { color:#dcd9ff; }
  .tasklist .item .name { font-weight:600; }
  .tasklist .item .meta { font-size:11px; color:#666; margin-top:2px; }
  .tasklist .empty { padding:8px; color:#888; font-style:italic; text-align:center; }
</style></head><body>
  <h3 style="margin:0">Compicated Onboarding</h3>
  <label>Tenant slug
    <input id="tenant" value="mojodojo" />
  </label>
  <label>Task
    <input id="taskSearch" type="search" placeholder="Search tasks…" autocomplete="off" />
    <div id="task" class="tasklist" role="listbox" tabindex="0"><div class="empty">— loading —</div></div>
  </label>
  <label>Date (YYYY-MM-DD)
    <input id="date" type="date" />
  </label>
  <label>Total time
    <div class="row">
      <input id="hours" type="number" min="0" value="0" />
      <input id="mins"  type="number" min="0" max="59" value="0" />
    </div>
  </label>
  <label><input type="checkbox" id="billable" checked /> Billable</label>
  <label>Batch size (entries per request)
    <input id="batch" type="number" min="1" max="120" value="60" />
  </label>
  <button id="go">Split into 90-minute logs</button>
  <div id="log"></div>
<script src="popup.js"></script>
</body></html>
